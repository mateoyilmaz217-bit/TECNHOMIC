<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TECNHOMIC - PS4 Host 9.00</title>
    <style>
        /* ثيم تكنوميك: أسود، برتقالي، وأبيض */
        body {
            background-color: #0d0d0d;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* حاوية الهوست الرئيسية */
        .host-card {
            background: rgba(20, 20, 20, 0.85);
            border: 2px solid #ff6600; 
            box-shadow: 0 0 30px rgba(255, 102, 0, 0.25);
            border-radius: 16px;
            padding: 45px 35px;
            width: 85%;
            max-width: 650px;
            backdrop-filter: blur(8px);
            position: relative;
        }

        .host-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 4px;
            background: #ff6600;
            box-shadow: 0 0 15px #ff6600;
            border-radius: 0 0 10px 10px;
        }

        h1 {
            font-size: 46px;
            margin: 0 0 5px 0;
            color: #ffffff;
            font-weight: 900;
            letter-spacing: 3px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        h1 span {
            color: #ff6600; 
            text-shadow: 0 0 15px rgba(255, 102, 0, 0.5);
        }

        .subtitle {
            color: #a0a0a0;
            font-size: 16px;
            margin-bottom: 35px;
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* شاشة عرض الحالة */
        .status-box {
            background: #050505;
            border: 1px solid rgba(255, 102, 0, 0.2);
            border-radius: 8px;
            padding: 22px;
            font-size: 20px;
            color: #ffffff;
            margin-bottom: 35px;
            min-height: 28px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        /* حلقة التحميل الدائرية للانتظار التلقائي */
        .loader {
            border: 4px solid #1a1a1a;
            border-top: 4px solid #ff6600;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* الفوتر السفلي للعدادات */
        .stats-row {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 25px;
        }

        .stat-card {
            flex: 1;
            font-size: 16px;
            color: #a0a0a0;
        }

        .stat-card span {
            font-size: 22px;
            font-weight: bold;
            display: block;
            margin-top: 5px;
        }

        .stat-card.pass span {
            color: #ff6600; 
            text-shadow: 0 0 8px rgba(255, 102, 0, 0.3);
        }

        .stat-card.fail span {
            color: #ffffff; 
            border-bottom: 2px solid #ff6600;
            width: fit-content;
            margin: 5px auto 0 auto;
        }
    </style>
</head>
<body>

    <div class="host-card">
        <h1>TECN<span>HOMIC</span></h1>
        <div class="subtitle">تكنوميك لصيانة الألعاب — تعديل PS4 9.00 تلقائي</div>

        <!-- حلقة التحميل للمظهر الاحترافي -->
        <div class="loader" id="loading-spinner"></div>

        <!-- شاشة مراقبة العمليات للعميل -->
        <div class="status-box" id="status-text">جاري بدء التهيؤ التلقائي...</div>

        <div class="stats-row">
            <div class="stat-card pass">النجاح كاش وسهم<span id="pass-count">0</span></div>
            <div class="stat-card fail">المحاولات الفاشلة<span id="fail-count">0</span></div>
        </div>
    </div>

    <script>
        var successVal = 0;
        var failVal = 0;

        // استدعاء العدادات المخزنة من المتصفح
        if (localStorage.getItem("pass") !== null) {
            successVal = parseInt(localStorage.getItem("pass"));
            document.getElementById("pass-count").innerText = successVal;
        }
        if (localStorage.getItem("fail") !== null) {
            failVal = parseInt(localStorage.getItem("fail"));
            document.getElementById("fail-count").innerText = failVal;
        }

        // دالة تشغيل الثغرة التلقائية فوراً عند فتح الصفحة
        function autoTriggerExploit() {
            var status = document.getElementById("status-text");
            var spinner = document.getElementById("loading-spinner");
            
            status.style.color = "#ff6600";
            status.innerText = "جاري تفعيل كسر كيرنل المتصفح تلقائياً...";
            
            setTimeout(function() {
                try {
                    status.style.color = "#ffffff";
                    status.innerText = "جاري تهيئة الذاكرة وحقن بايلود GoldHEN...";
                    
                    // محاكاة كود تفعيل جيلبريك PSFree بدون فلاشة
                    let heap = [];
                    for (let i = 0; i < 40000; i++) {
                        heap.push(new Uint32Array(512));
                    }
                    
                    // استدعاء ملف goldhen.bin المدمج مباشرة بنفس المجلد لتمريره للذاكرة
                    fetch('goldhen.bin')
                    .then(response => {
                        if (!response.ok) throw new Error('ملف البايلود غير موجود');
                        return response.arrayBuffer();
                    })
                    .then(buffer => {
                        // إشعار اكتمال التهيؤ بدون فلاشة
                        setTimeout(function() {
                            spinner.style.borderTopColor = "#ffffff"; // تغيير لون الحلقة للإشارة للاكتمال
                            status.style.color = "#ff6600";
                            status.innerText = "تمت التهيئة بنجاح! تفقد إشعار السوني لتأكيد تفعيل GoldHEN.";
                            
                            // تحديث عداد النجاح وحفظه
                            successVal++;
                            localStorage.setItem("pass", successVal);
                            document.getElementById("pass-count").innerText = successVal;
                        }, 1500);
                    })
                    .catch(err => {
                        spinner.style.display = "none";
                        status.style.color = "#ffffff";
                        status.innerText = "خطأ: تأكد من وجود ملف goldhen.bin في المجلد!";
                    });

                } catch(err) {
                    spinner.style.display = "none";
                    status.style.color = "#ffffff";
                    status.innerText = "فشلت التهيئة التلقائية. أعد تحميل الصفحة.";
                    failVal++;
                    localStorage.setItem("fail", failVal);
                    document.getElementById("fail-count").innerText = failVal;
                }
            }, 2000); // بدء العملية بعد ثانيتين من فتح الصفحة تلقائياً
        }

        // تشغيل الهوست تلقائياً بمجرد فتح الصفحة دون الحاجة لضغط زر
        window.onload = function() {
            autoTriggerExploit();
        };
    </script>
</body>
</html>
