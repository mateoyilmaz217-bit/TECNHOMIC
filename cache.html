<!DOCTYPE html>
<html lang="ar" dir="rtl" manifest="cache.manifest">
<head>
    <meta charset="UTF-8">
    <title>TECNHOMIC - كاش التعديل</title>
    <style>
        body {
            background-color: #0d0d0d;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .cache-card {
            background: rgba(20, 20, 20, 0.85);
            border: 2px solid #ff6600;
            box-shadow: 0 0 30px rgba(255, 102, 0, 0.25);
            border-radius: 16px;
            padding: 40px;
            width: 80%;
            max-width: 550px;
        }
        h1 {
            color: #ffffff;
            margin: 0 0 10px 0;
            font-size: 38px;
            font-weight: 900;
        }
        h1 span {
            color: #ff6600;
        }
        .progress-outline {
            background: #050505;
            border-radius: 6px;
            height: 20px;
            width: 100%;
            overflow: hidden;
            border: 1px solid rgba(255, 102, 0, 0.3);
            margin: 25px 0;
        }
        .progress-fill {
            background: linear-gradient(90deg, #ff8c00, #ff5500);
            height: 100%;
            width: 0%;
            transition: width 0.2s ease-in-out;
        }
        .status-msg {
            font-size: 18px;
            color: #a0a0a0;
        }
        .percentage {
            font-size: 24px;
            color: #ff6600;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="cache-card">
        <h1>TECN<span>HOMIC</span></h1>
        <div class="status-msg" id="status">جاري الاتصال وحفظ كاش التعديل أوفلاين...</div>
        <div class="progress-outline">
            <div class="progress-fill" id="bar"></div>
        </div>
        <div class="percentage" id="percent">0%</div>
    </div>

    <script>
        var cache = window.applicationCache;
        var bar = document.getElementById("bar");
        var percent = document.getElementById("percent");
        var status = document.getElementById("status");

        cache.addEventListener('downloading', function() {
            status.innerText = "جاري تحميل ملفات تكنوميك وحفظها داخل جهازك...";
        }, false);

        cache.addEventListener('progress', function(e) {
            var val = Math.round((e.loaded / e.total) * 100);
            bar.style.width = val + "%";
            percent.innerText = val + "%";
        }, false);

        cache.addEventListener('cached', function() {
            status.innerText = "اكتمل تثبيت الكاش بنجاح! يمكنك الآن تشغيل التعديل بدون إنترنت.";
            setTimeout(function() {
                window.location.href = "index.html";
            }, 1500);
        }, false);

        cache.addEventListener('updateready', function() {
            cache.swapCache();
            window.location.reload();
        }, false);

        cache.addEventListener('error', function() {
            status.innerText = "خطأ في الاتصال، تأكد من الشبكة وجرب مجدداً.";
        }, false);
    </script>
</body>
</html>
