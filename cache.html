<!DOCTYPE html>
<html manifest="cache.manifest">
<head>
<meta charset="utf-8">
<title>TECNHOMIC PSFree Host</title>
<style>
body {
  background-color: #ffffff;
  color: #000000;
  font-family: sans-serif;
  text-align: center;
  margin: 0;
}
.info {
  margin-top: 50px;
}
#bar {
  background: #000000;
  height: 10px;
  width: 0%;
  transition: width 0.1s ease-in-out;
}
#bar_container {
  background: #eeeeee;
  border: 1px solid #000000;
  width: 300px;
  height: 10px;
  margin: 20px auto;
  overflow: hidden;
}
#status {
  font-size: 20px;
  font-weight: bold;
}
</style>
<script>
function DLProgress(e){
  Percent = (Math.round(e.loaded / e.total * 100));
  document.getElementById("bar").style.width = Percent + '%';
  document.getElementById("status").innerHTML = "جاري حفظ ملفات التعديل كاش: " + Percent + '%';
}
function DisplayCacheStatus(){
  setTimeout(function(){document.getElementById("status").innerHTML = "تم حفظ الكاش بنجاح!";}, 1000);
  setTimeout(function(){window.location.href = "index.html";}, 2500);
}
window.applicationCache.addEventListener("downloading", function(){document.getElementById("status").innerHTML = "بدء تحميل ملفات الكاش...";}, false);
window.applicationCache.addEventListener("progress", DLProgress, false);
window.applicationCache.addEventListener("cached", DisplayCacheStatus, false);
window.applicationCache.addEventListener("updateready", function(){window.applicationCache.swapCache(); window.location.reload();}, false);
window.applicationCache.addEventListener("noupdate", function(){window.location.href = "index.html";}, false);
window.applicationCache.addEventListener("error", function(){window.location.href = "index.html";}, false);
</script>
</head>
<body>
<div class="info">
  <h1 style="font-size: 32px; margin-bottom: 5px;">TECNHOMIC PSFree Host</h1>
  <div id="status" style="margin-top: 20px;">جاري الاتصال...</div>
  <div id="bar_container">
    <div id="bar"></div>
  </div>
</div>
</body>
</html>
